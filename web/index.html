<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reconhecimento de Caracteres Manuscritos</title>

    <script>
      window.opencvReady = false;
    </script>
    <script async
      src="https://docs.opencv.org/4.x/opencv.js"
      type="text/javascript">
    </script>
    <script>
      function onOpenCvReady() {
        if (window.opencvReady) return;
        window.opencvReady = true;
        document.dispatchEvent(new Event('opencv-ready'));
      }
      // Fallback: poll until cv.Mat is available
      (function pollOpenCv() {
        var check = setInterval(function() {
          if (window.opencvReady) { clearInterval(check); return; }
          if (typeof cv !== 'undefined' && cv.Mat && typeof cv.imread === 'function') {
            clearInterval(check);
            onOpenCvReady();
          }
        }, 200);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
